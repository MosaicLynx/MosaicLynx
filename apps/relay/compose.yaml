services:
  relay:
    build:
      context: ../..
      dockerfile: apps/relay/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      RATE_LIMIT_HMAC_KEY: ${RATE_LIMIT_HMAC_KEY:?set RATE_LIMIT_HMAC_KEY to at least 32 random base64url bytes}
      TRUST_PROXY_HOPS: ${TRUST_PROXY_HOPS:-1}
      CREATE_RATE_COUNT: ${CREATE_RATE_COUNT:-10}
      CREATE_RATE_BYTES: ${CREATE_RATE_BYTES:-4194304}
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - 127.0.0.1:8787:8787
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  redis:
    image: redis:8.0.6-alpine@sha256:5f61955be8ab2ccee9372b84ae4d4da2e2b156f87281e3f218544055e7ee04d4
    command: ['redis-server', '--save', '', '--appendonly', 'no', '--maxmemory-policy', 'noeviction']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 2s
      timeout: 2s
      retries: 10
    tmpfs:
      - /data:size=256m,mode=0700
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
